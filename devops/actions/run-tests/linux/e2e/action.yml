name: 'Run SYCL E2E tests'

inputs:
  ref:
    required: false
  binaries_artifact:
    required: false
  testing_mode:
    required: true
  extra_cmake_args:
    required: false
  target_devices:
    required: false
    default: all
  extra_lit_opts:
    required: false
  retention-days:
    required: false
  sycl_compiler:
    required: false
  build_unified_runtime_locally:
    required: false
    default: 'true'


runs:
  using: "composite"
  steps:
  - name: Checkout E2E tests
    if: ${{ !(inputs.testing_mode == 'run-only' && inputs.binaries_artifact == 'in-container') }}
    uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    with:
      path: llvm
      ref: ${{ inputs.ref || github.sha }}
      sparse-checkout: |
        llvm/utils/lit
        sycl/test-e2e
  - name: Download E2E Binaries
    if: ${{ inputs.testing_mode == 'run-only' && inputs.binaries_artifact != 'in-container' }}
    uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
    with:
      name: ${{ inputs.binaries_artifact }}
  - name: Extract E2E Binaries
    if: ${{ inputs.testing_mode == 'run-only' && inputs.binaries_artifact != 'in-container' }}
    shell: bash
    run: |
      mkdir build-e2e
      tar -I 'zstd' -xf e2e_binaries.tar.zst -C build-e2e

  - name: Extract E2E tests from container image
    if: ${{ inputs.testing_mode == 'run-only' && inputs.binaries_artifact == 'in-container' }}
    shell: bash
    run: |
      mkdir build-e2e llvm
      tar -I 'zstd' -xf /sycl-prebuilt/e2e_binaries.tar.zst -C build-e2e
      tar -I 'zstd' -xf /sycl-prebuilt/e2e_sources.tar.zst -C llvm

  - name: Checkout unified-runtime source
    if: inputs.build_unified_runtime_locally == 'true'
    uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    with:
      path: unified-runtime-src
      sparse-checkout: |
        unified-runtime/
      ref: ${{ inputs.ref || github.sha }}

  - name: Provide lit binary for UR tests
    if: inputs.build_unified_runtime_locally == 'true'
    shell: bash
    run: |
      if command -v lit >/dev/null 2>&1; then
        exit 0
      fi

      mkdir -p "$HOME/.local/bin"

      if [ -x "$PWD/toolchain/bin/llvm-lit" ]; then
        ln -sfn "$PWD/toolchain/bin/llvm-lit" "$HOME/.local/bin/lit"
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        exit 0
      fi

      if command -v llvm-lit >/dev/null 2>&1; then
        ln -sfn "$(command -v llvm-lit)" "$HOME/.local/bin/lit"
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        exit 0
      fi

      python3 -m pip install --user lit
      echo "$HOME/.local/bin" >> $GITHUB_PATH

  - name: Build unified-runtime with container CUDA
    if: inputs.build_unified_runtime_locally == 'true'
    shell: bash
    run: |
      cd unified-runtime-src
      ln -sfn "$PWD/../toolchain" dpcpp_compiler
      cmake -S unified-runtime -B build \
        -DCMAKE_C_COMPILER=gcc \
        -DCMAKE_CXX_COMPILER=g++ \
        -DCMAKE_BUILD_TYPE=Release \
        -DUR_ENABLE_TRACING=ON \
        -DUR_DEVELOPER_MODE=ON \
        -DUR_BUILD_TESTS=ON \
        -DUR_BUILD_ADAPTER_L0_V2=ON \
        -DUR_STATIC_LOADER=OFF \
        -DUR_STATIC_ADAPTER_L0_V2=OFF \
        -DUR_DPCXX=./dpcpp_compiler/bin/clang++ \
        -DUR_SYCL_LIBRARY_DIR=./dpcpp_compiler/lib \
        -DUR_CONFORMANCE_NVIDIA_ARCH="sm_75" \
        -DCMAKE_INSTALL_PREFIX=./install
      cmake --build build
      cmake --install build

  - name: Install built unified-runtime
    if: inputs.build_unified_runtime_locally == 'true'
    shell: bash
    run: |
      # Install the locally-built UR libraries over the prebuilt ones
      mkdir -p "$PWD/toolchain/lib/plugins"
      cp unified-runtime-src/install/lib/libur_adapter_cuda.so* "$PWD/toolchain/lib/" 2>/dev/null || true
      cp unified-runtime-src/install/lib/libur_loader.so* "$PWD/toolchain/lib/" 2>/dev/null || true
      cp unified-runtime-src/install/lib/plugins/* "$PWD/toolchain/lib/plugins/" 2>/dev/null || true
      cp unified-runtime-src/build/lib/libur_adapter_cuda.so* "$PWD/toolchain/lib/" 2>/dev/null || true
      cp unified-runtime-src/build/lib/libur_loader.so* "$PWD/toolchain/lib/" 2>/dev/null || true
      cp unified-runtime-src/build/lib/plugins/* "$PWD/toolchain/lib/plugins/" 2>/dev/null || true
      # Also ensure the built libs are in LD_LIBRARY_PATH
      echo LD_LIBRARY_PATH="$PWD/unified-runtime-src/install/lib:$PWD/unified-runtime-src/build/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

  - name: Deduce E2E CMake options
    if: inputs.testing_mode != 'run-only'
    id: cmake_opts
    shell: bash
    env:
      CMAKE_EXTRA_ARGS: ${{ inputs.extra_cmake_args }}
    run: |
      if [ -n "$CMAKE_EXTRA_ARGS" ]; then
        echo "opts=$CMAKE_EXTRA_ARGS" >> $GITHUB_OUTPUT
      fi
  - name: Configure E2E tests
    if: inputs.testing_mode != 'run-only'
    shell: bash
    run: |
      cmake -GNinja -B./build-e2e -S./llvm/sycl/test-e2e -DCMAKE_CXX_COMPILER="${{ inputs.sycl_compiler || '$(which clang++)'}}" -DLLVM_LIT="$PWD/llvm/llvm/utils/lit/lit.py" ${{ steps.cmake_opts.outputs.opts }}
  - name: SYCL End-to-end tests
    id: run_e2e
    continue-on-error: true
    shell: bash
    env:
      LIT_OPTS: -v --no-progress-bar --show-unsupported --show-pass --show-xfail --max-time 3600 --time-tests --param print_features=True --param test-mode=${{ inputs.testing_mode }} --param sycl_devices=${{ inputs.target_devices }} ${{ inputs.extra_lit_opts }}
    run: |
      ninja -C build-e2e check-sycl-e2e > e2e.log 2>&1
  # Two steps below are duplicated between Lin/Win actions, updates must change both
  - name: E2E logs
    if: ${{ always() }}
    shell: bash
    run: |
      echo "::group::Show Full E2E Log"
      cat e2e.log
      echo "::endgroup::"
  - name: Report E2E Failures
    if: steps.run_e2e.outcome != 'success'
    shell: bash
    # For some reason Github uses the first line from the `run: |` section for
    # the folded entry when displaying instead of this step's name.
    run: |
        # Report E2E Failures
        awk '/^Failed Tests|Unexpectedly Passed Tests|Unresolved tests|Timed Out Tests|Testing Time/{flag=1}/FAILED: CMakeFiles/{flag=0}flag' e2e.log >> $GITHUB_STEP_SUMMARY
        awk '/^Failed Tests|Unexpectedly Passed Tests|Unresolved tests|Timed Out Tests|Testing Time/{flag=1}/FAILED: CMakeFiles/{flag=0}flag' e2e.log
        exit 1

  - name: Pack E2E binaries
    if: ${{ !cancelled() && inputs.binaries_artifact != '' && inputs.testing_mode != 'run-only' }}
    shell: bash
    run: |
      tar -I 'zstd -9' -cf e2e_binaries.tar.zst -C ./build-e2e .
  - name: Upload E2E binaries
    if: ${{ !cancelled() && inputs.binaries_artifact != '' && inputs.testing_mode != 'run-only' }}
    uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
    with:
      name: ${{ inputs.binaries_artifact }}
      path: e2e_binaries.tar.zst
      retention-days: ${{ inputs.retention-days }}
  - name: Cleanup E2E tests
    if: ${{ !cancelled() }}
    shell: bash
    run: |
      # rm -rf build-e2e
