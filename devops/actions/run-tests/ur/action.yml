name: 'Run UR Tests'

inputs:
  test_type:
    description: 'Type of tests to run (adapter-specific or conformance)'
    required: true
  build_dir:
    required: false
    default: 'build'
  artifact_name:
    description: 'Name for uploaded test artifacts (logs, XML)'
    required: false
    default: ''

runs:
  using: "composite"
  steps:
  - name: Run ${{ inputs.test_type }} tests
    id: run_tests
    continue-on-error: true
    shell: bash
    env:
      BUILD_DIR: ${{ inputs.build_dir }}
      TEST_TYPE: ${{ inputs.test_type }}
    run: |
      # Run tests via Python (handles validation, config, cmake execution)
      OUTPUT=$(python3 devops/scripts/ur_ci_utils.py run-tests "$TEST_TYPE" "$BUILD_DIR" "$GITHUB_WORKSPACE")
      EXIT_CODE=$?
      
      # Parse Python output and set GitHub Actions outputs (not env for security)
      while IFS='=' read -r key value; do
        if [ -n "$key" ] && [ -n "$value" ]; then
          echo "$key=$value" >> $GITHUB_OUTPUT
        fi
      done <<< "$OUTPUT"
      
      exit $EXIT_CODE

  - name: Show full test log
    if: ${{ always() }}
    shell: bash
    env:
      LOG_FILE: ${{ steps.run_tests.outputs.log_file }}
    run: |
      if [ ! -f "$LOG_FILE" ]; then
        echo "::warning::Test log not found"
        exit 0
      fi
      
      echo "::group::Show Full Test Log (filtered)"
      python3 devops/scripts/ur_test_summary.py filter-log "$LOG_FILE" || { echo "::error::Filter failed"; head -1000 "$LOG_FILE"; }
      echo "::endgroup::"
  
  - name: Report test failures
    if: steps.run_tests.outcome != 'success'
    shell: bash
    env:
      LOG_FILE: ${{ steps.run_tests.outputs.log_file }}
    run: |
      python3 devops/scripts/ur_test_summary.py extract-errors "$LOG_FILE"
      exit 1
  
  - name: Show test statistics and lists
    if: ${{ always() }}
    shell: bash
    env:
      BUILD_DIR: ${{ inputs.build_dir }}
      TEST_TYPE: ${{ inputs.test_type }}
      LOG_FILE: ${{ steps.run_tests.outputs.log_file }}
      XML_NAME: ${{ steps.run_tests.outputs.xml_name }}
      XML_SEARCH_PATH: ${{ steps.run_tests.outputs.xml_search_path }}
    run: |
      if [ ! -f "$LOG_FILE" ]; then
        echo "::warning::Test log not found"
        exit 0
      fi
      
      if [ ! -s "$LOG_FILE" ]; then
        echo "::warning::Test log is empty"
        exit 0
      fi
      
      XML_FILE=$(python3 devops/scripts/ur_ci_utils.py find-xml "$XML_SEARCH_PATH" "$XML_NAME")
      
      python3 devops/scripts/ur_test_summary.py show-summary "$LOG_FILE" "${XML_FILE:-}"

  - name: Prepare test artifacts
    if: ${{ always() && inputs.artifact_name != '' && (inputs.test_type != 'adapter-specific' || steps.run_tests.outputs.skip_artifacts != '1') }}
    shell: bash
    env:
      LOG_FILE: ${{ steps.run_tests.outputs.log_file }}
      XML_NAME: ${{ steps.run_tests.outputs.xml_name }}
      XML_SEARCH_PATH: ${{ steps.run_tests.outputs.xml_search_path }}
    run: |
      mkdir -p test_artifacts
      
      if [ -f "$LOG_FILE" ]; then
        cp "$LOG_FILE" test_artifacts/
      fi
      
      FOUND_XML=$(python3 devops/scripts/ur_ci_utils.py find-xml "$XML_SEARCH_PATH" "$XML_NAME")
      if [ -n "$FOUND_XML" ]; then
        cp "$FOUND_XML" "test_artifacts/$XML_NAME"
      fi

  - name: Upload test artifacts
    if: ${{ always() && inputs.artifact_name != '' && (inputs.test_type != 'adapter-specific' || steps.run_tests.outputs.skip_artifacts != '1') }}
    uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
    with:
      name: ${{ inputs.artifact_name }}
      path: test_artifacts/
      retention-days: 7
      if-no-files-found: warn
