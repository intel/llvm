name: 'Run UR Adapter Conformance Tests'

inputs:
  build_dir:
    required: false
    default: 'build'

runs:
  using: "composite"
  steps:
  - name: Run conformance tests
    id: run_tests
    continue-on-error: true
    shell: bash
    env:
      ZE_ENABLE_LOADER_DEBUG_TRACE: 1
      LIT_OPTS: "--show-unsupported --show-pass --show-xfail --no-progress-bar --succinct --timeout 120 -j 50"
    run: |
      echo "::group::Show Full Test Adapters Logs"
      cmake --build ${{ inputs.build_dir }} -j $(($(nproc)/3)) -- check-unified-runtime-conformance 2>&1 | tee conformance_tests.log
      echo "::endgroup::"
  
  - name: Report conformance failures
    if: steps.run_tests.outcome != 'success'
    shell: bash
    run: |
      awk '/^(Failed Tests|Unexpectedly Passed Tests|Unresolved Tests|Timed Out Tests) \([0-9]+\):/ {flag=1} /^Testing Time:/ {flag=1} flag {if (NF>0 && !/^[ \t]/ && $0 !~ /^(Failed Tests|Unexpectedly Passed|Unresolved|Timed Out|Testing Time|Expected|Unexpected|Total Discovered|Unsupported Tests)/) {exit}; print}' conformance_tests.log >> $GITHUB_STEP_SUMMARY
      awk '/^(Failed Tests|Unexpectedly Passed Tests|Unresolved Tests|Timed Out Tests) \([0-9]+\):/ {flag=1} /^Testing Time:/ {flag=1} flag {if (NF>0 && !/^[ \t]/ && $0 !~ /^(Failed Tests|Unexpectedly Passed|Unresolved|Timed Out|Testing Time|Expected|Unexpected|Total Discovered|Unsupported Tests)/) {exit}; print}' conformance_tests.log
      exit 1
