name: 'Run UR Adapter Conformance Tests'

inputs:
  build_dir:
    required: false
    default: 'build'

runs:
  using: "composite"
  steps:
  - name: Run conformance tests
    id: run_tests
    continue-on-error: true
    shell: bash
    env:
      BUILD_DIR: ${{ inputs.build_dir }}
      ZE_ENABLE_LOADER_DEBUG_TRACE: 1
      LIT_OPTS: "--show-unsupported --show-pass --show-xfail --no-progress-bar --succinct --timeout 120 -j 50"
    run: |
      if [[ "$BUILD_DIR" =~ [^a-zA-Z0-9/_-] ]] || [[ "$BUILD_DIR" =~ \.\. ]]; then
        echo "::error::Invalid build_dir: contains disallowed characters or path traversal"
        exit 1
      fi
      
      echo "::group::Show Full Test Adapters Logs"
      cmake --build "$BUILD_DIR" -j $(($(nproc)/3)) -- check-unified-runtime-conformance 2>&1 | tee conformance_tests.log | sed '/^\*\*\*\*\*\*\*\*\*\*\*\*\*\*\*\*\*\*\*\*/,$d'
      EXIT_CODE=${PIPESTATUS[0]}
      echo "::endgroup::"
      exit $EXIT_CODE
  
  - name: Report conformance failures
    if: steps.run_tests.outcome != 'success'
    shell: bash
    run: |
      python3 devops/scripts/ur_test_summary.py extract-errors conformance_tests.log | tee -a $GITHUB_STEP_SUMMARY
      exit 1
  
  - name: List all conformance tests
    if: ${{ always() }}
    shell: bash
    env:
      BUILD_DIR: ${{ inputs.build_dir }}
    run: |
      > all_conformance_tests.txt
      echo "Listing all conformance tests..."
      binary_count=0
      test_line_count=0
      
      # Use process substitution to avoid subshell issues with pipe
      while IFS= read -r binary; do
        binary_count=$((binary_count + 1))
        binary_name=$(basename $binary)
        echo "Processing binary $binary_count: $binary_name"
        before=$(wc -l < all_conformance_tests.txt 2>/dev/null || echo 0)
        
        # Run with debug to see what happens
        echo "  Running: $binary --gtest_list_tests"
        
        # Capture output to temp file to avoid SIGPIPE with tee/grep pipe
        temp_output=$(mktemp)
        "$binary" --gtest_list_tests > "$temp_output" 2>&1 || {
          exit_code=$?
          echo "  Warning: $binary_name failed with --gtest_list_tests (exit code $exit_code)"
        }
        
        # Show errors/warnings to stderr for debugging
        cat "$temp_output" >&2
        
        # Filter empty lines and append to all_conformance_tests.txt
        grep -v "^$" "$temp_output" >> all_conformance_tests.txt
        rm -f "$temp_output"
        
        after=$(wc -l < all_conformance_tests.txt 2>/dev/null || echo 0)
        added=$((after - before))
        test_line_count=$((test_line_count + added))
        echo "  Added $added lines (total test lines: $after)"
        
        # Show sample of what was added (first 5 lines of new content)
        if [ $added -gt 0 ]; then
          echo "  Sample output (first 3 lines):"
          tail -n $added all_conformance_tests.txt | head -3 | sed 's/^/    /'
        fi
      done < <(find "$BUILD_DIR/test/conformance" -name "*-test" -type f -executable 2>/dev/null)
      
      echo "Summary: Processed $binary_count binaries, collected $test_line_count test definition lines"
  
  - name: Show conformance test statistics and lists
    if: ${{ always() }}
    shell: bash
    run: |
      if [ ! -f conformance_tests.log ]; then
        echo "Log file not found"
        exit 0
      fi
      
      python3 devops/scripts/ur_test_summary.py show-summary conformance_tests.log all_conformance_tests.txt
