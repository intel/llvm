name: 'Build Intel Embree'
description: 'Clone and build Embree for Intel GPU with SYCL support'

inputs:
  cmake_install_prefix:
    description: 'CMAKE_INSTALL_PREFIX for Embree build'
    required: true
  c_compiler:
    description: 'Path to C compiler'
    required: true
  cxx_compiler:
    description: 'Path to C++ compiler'
    required: true

runs:
  using: "composite"
  steps:
    - uses: TheMrMilchmann/setup-msvc-dev@368ef7d1ee4d1171b31d4a7f67f4d954f903f5a9 # v4.1.0
      if: runner.os == 'Windows'
      with:
        arch: x64

    - name: Checkout Embree
      uses: ./devops/actions/cached_checkout
      with:
        repository: 'RenderKit/embree'
        ref: 'v4.4.0'
        path: 'embree-src'
        cache_path: ${{ runner.os == 'Windows' && 'D:\\github\\_work\\repo_cache\\' || '/__w/repo_cache/' }}

    - name: Update Embree Submodules
      shell: bash
      run: |
        cd embree-src
        git submodule update --init --recursive

    - name: Apply source patches
      shell: bash
      run: |
        patch -p1 -d embree-src -i "$GITHUB_WORKSPACE/devops/actions/blender/embree/patches/Fix-build.patch"
        patch -p1 -d embree-src -i "$GITHUB_WORKSPACE/devops/actions/blender/embree/patches/Fix-dpclang.patch"

    - name: Configure Embree
      shell: bash
      env:
        INSTALL_PREFIX_INPUT: ${{ inputs.cmake_install_prefix }}
        C_COMPILER_INPUT: ${{ inputs.c_compiler }}
        CXX_COMPILER_INPUT: ${{ inputs.cxx_compiler }}
      run: |
        cmake -GNinja -B embree-build -S embree-src \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX="$INSTALL_PREFIX_INPUT" \
          -DCMAKE_C_COMPILER="$C_COMPILER_INPUT" \
          -DCMAKE_CXX_COMPILER="$CXX_COMPILER_INPUT" \
          -DEMBREE_SYCL_SUPPORT=ON \
          -DEMBREE_ISPC_SUPPORT=OFF \
          -DEMBREE_TUTORIALS=OFF

    - name: Build Embree
      shell: bash
      run: cmake --build embree-build --config Release

    - name: Install Embree
      shell: bash
      run: cmake --install embree-build --config Release

    - name: Cleanup
      shell: bash
      if: always()
      run: |
        rm -rf embree-build embree-src
