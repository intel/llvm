name: 'Build Intel Open Image Denoise (OIDN)'
description: 'Clone and build OIDN for Intel GPU with SYCL support'

inputs:
  cmake_install_prefix:
    description: 'CMAKE_INSTALL_PREFIX for OIDN build'
    required: true
  c_compiler:
    description: 'Path to C compiler'
    required: true
  cxx_compiler:
    description: 'Path to C++ compiler'
    required: true

runs:
  using: "composite"
  steps:
    - uses: TheMrMilchmann/setup-msvc-dev@368ef7d1ee4d1171b31d4a7f67f4d954f903f5a9 # v4.1.0
      if: runner.os == 'Windows'
      with:
        arch: x64

    - name: Source OneAPI TBB vars.sh
      if: runner.os == 'Linux'
      uses: ./devops/actions/source-tbb

    - name: Checkout OIDN
      uses: ./devops/actions/cached_checkout
      with:
        repository: 'RenderKit/oidn'
        ref: '4e92767dd4a46574a968faa1a3d6c62af699ee38' # Switch to release branch after next release, see https://github.com/intel/llvm/issues/21893
        path: 'oidn-src'
        cache_path: ${{ runner.os == 'Windows' && 'D:\\github\\_work\\repo_cache\\' || '/__w/repo_cache/' }}

    - name: Update OIDN Submodules
      shell: bash
      run: |
        cd oidn-src
        git submodule update --init --recursive

    - name: Configure OIDN
      shell: bash
      env:
        INSTALL_PREFIX_INPUT: ${{ inputs.cmake_install_prefix }}
        C_COMPILER_INPUT: ${{ inputs.c_compiler }}
        CXX_COMPILER_INPUT: ${{ inputs.cxx_compiler }}
      run: |
        cmake -GNinja -B oidn-build -S oidn-src \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX="$INSTALL_PREFIX_INPUT" \
          -DCMAKE_C_COMPILER="$C_COMPILER_INPUT" \
          -DCMAKE_CXX_COMPILER="$CXX_COMPILER_INPUT" \
          -DOIDN_DEVICE_SYCL=ON \
          -DOIDN_DEVICE_CUDA=OFF \
          -DOIDN_DEVICE_HIP=OFF

    - name: Build OIDN
      shell: bash
      run: cmake --build oidn-build --config Release

    - name: Install OIDN
      shell: bash
      run: cmake --install oidn-build --config Release

    - name: Cleanup
      shell: bash
      if: always()
      run: |
        rm -rf oidn-build oidn-src
