--- #--------------------------------------------------------------------------
type: header
desc: "Intel $OneApi Unified Runtime Experimental API for reusable events"
ordinal: "100"
--- #--------------------------------------------------------------------------
type: enum
extend: true
typed_etors: true
desc: "Extension enums to $x_device_info_t to support reusable events."
name: $x_device_info_t
etors:
    - name: REUSABLE_EVENTS_EXP
      value: "0x2024"
      desc: "[$x_bool_t] returns true if the device supports reusable events created with $xEventCreateExp."
    - name: REUSABLE_EVENTS_PROFILING_EXP
      value: "0x2025"
      desc: "[$x_bool_t] returns true if the device supports profiling timestamps for reusable events created with $xEventCreateExp."
--- #--------------------------------------------------------------------------
type: enum
desc: "Flags for creating a reusable event."
name: $x_exp_event_create_flags_t
etors:
    - name: PROFILING_ENABLE
      value: "$X_BIT(0)"
      desc: "Enables profiling timestamps for the event."
--- #--------------------------------------------------------------------------
type: struct
desc: "Properties for $xEventCreateExp."
name: $x_exp_event_create_properties_t
base: $x_base_properties_t
members:
    - type: $x_exp_event_create_flags_t
      name: flags
      desc: "[in] event creation flags"
--- #--------------------------------------------------------------------------
type: struct
desc: >
    Extended enqueue properties for specifying a pre-existing event to signal.
    This structure may be passed via the pNext chain of
    $x_exp_enqueue_ext_properties_t when calling
    $xEnqueueEventsWaitWithBarrierExt. When present, the implementation
    signals hSignalEvent on completion instead of allocating a new event.
    The handle value pointed to by hSignalEvent is never overwritten by the
    implementation.
name: $x_exp_enqueue_signal_event_properties_t
base: $x_base_properties_t
members:
    - type: $x_event_handle_t
      name: hSignalEvent
      desc: >
            [in] handle of an existing reusable event to signal on completion.
            The handle value is not modified by the implementation.
            The event must have been created with $xEventCreateExp.
--- #--------------------------------------------------------------------------
type: enum
extend: true
desc: "Structure type experimental enumerations to support reusable events."
name: $x_structure_type_t
etors:
    - name: EXP_EVENT_CREATE_PROPERTIES
      desc: $x_exp_event_create_properties_t
      value: "0x4001"
    - name: EXP_ENQUEUE_SIGNAL_EVENT_PROPERTIES
      desc: $x_exp_enqueue_signal_event_properties_t
      value: "0x4002"
--- #--------------------------------------------------------------------------
type: function
desc: "Create a reusable event object."
class: $xEvent
name: CreateExp
ordinal: "0"
details:
    - "A reusable event can be associated with at most one in-flight command at a time, but may be reused across multiple successive commands."
    - "The event is initially in the completed state."
    - "The context and device must be compatible: hDevice must be one of the devices associated with hContext."
    - "To enable profiling timestamps, pass $X_EXP_EVENT_CREATE_FLAG_PROFILING_ENABLE in pProperties->flags."
params:
    - type: $x_context_handle_t
      name: hContext
      desc: "[in] handle of the context object"
    - type: $x_device_handle_t
      name: hDevice
      desc: "[in] handle of the device on which the event will be used"
    - type: const $x_exp_event_create_properties_t*
      name: pProperties
      desc: "[in][optional] pointer to event creation properties"
    - type: $x_event_handle_t*
      name: phEvent
      desc: "[out][alloc] pointer to handle of the created event object"
returns:
    - $X_RESULT_ERROR_INVALID_CONTEXT
    - $X_RESULT_ERROR_INVALID_DEVICE
    - $X_RESULT_ERROR_INVALID_VALUE:
        - "`pProperties != NULL && pProperties->flags & ~$X_EXP_EVENT_CREATE_FLAG_PROFILING_ENABLE`"
    - $X_RESULT_ERROR_UNSUPPORTED_FEATURE:
        - "If $X_DEVICE_INFO_REUSABLE_EVENTS_EXP is false."
        - "If $X_EXP_EVENT_CREATE_FLAG_PROFILING_ENABLE is set and $X_DEVICE_INFO_REUSABLE_EVENTS_PROFILING_EXP is false."
    - $X_RESULT_ERROR_OUT_OF_HOST_MEMORY
    - $X_RESULT_ERROR_OUT_OF_RESOURCES
