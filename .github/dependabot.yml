version: 2
updates:
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      # Required to update composite actions.
      # See: https://github.com/dependabot/dependabot-core/issues/6704
      - "/devops/actions/*"
      - "/devops/actions/*/*"
      - "/devops/actions/*/*/*"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: "pip"
    directory: "/llvm/docs"
    schedule:
      interval: "monthly"
    groups:
      llvm-docs-requirements:
        patterns:
          - "*"
