name: Validate Release String
description: >-
  This checks to make sure that the given release-version string is well formed.
inputs:
  release-version:
    required: true

runs:
  using: "composite"
  steps:
    - env:
        RELEASE_VERSION: ${{ inputs.release-version }}
      shell: bash
      run: |
        grep -e '^[0-9]\+\.[0-9]\+\.[0-9]\+\(-rc[0-9]\+\)\?$' <<< "$RELEASE_VERSION"
