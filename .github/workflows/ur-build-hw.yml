name: UR - Build adapters, test on HW

on:
  workflow_call:
    inputs:
      adapter_name:
        required: true
        type: string
      other_adapter_name:
        required: false
        type: string
        default: ""
      runner_name:
        required: true
        type: string
      static_loader:
        required: false
        type: string
        default: OFF
      static_adapter:
        required: false
        type: string
        default: OFF
      docker_image:
        required: true
        type: string
        default: ""
      image_options:
        required: true
        type: string
        default: ""
      install_igc_driver:
        required: false
        type: string
        default: ""

permissions: read-all

env:
  UR_LOG_CUDA: "level:error;flush:error"
  UR_LOG_HIP: "level:error;flush:error"
  UR_LOG_LEVEL_ZERO: "level:error;flush:error"
  UR_LOG_NATIVE_CPU: "level:error;flush:error"
  UR_LOG_OPENCL: "level:error;flush:error"

jobs:
  adapter_build_hw:
    name: Build & CTS
    # run only on upstream; forks won't have the HW
    if: github.repository == 'intel/llvm'
    strategy:
      fail-fast: false
      matrix:
        adapter: [
          {
            name: "${{inputs.adapter_name}}",
            other_name: "${{inputs.other_adapter_name}}",
            static_Loader: "${{inputs.static_loader}}",
            static_adapter: "${{inputs.static_loader}}"
          }
        ]
        build_type: [Release]
        compiler: [{c: gcc, cxx: g++}]

    runs-on: ${{inputs.runner_name}}
    container:
      image: ${{ inputs.docker_image }}
      options: ${{ inputs.image_options }}

    steps:
    # TODO:
    # - switch to Ninja generator in CMake
    # - downloading DPC++ should be integrated somehow; most likely use nightly release.
    #
    - name: Checkout LLVM
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    # for some reason it's required to re-configure python for venv to work properly.
    - name: Set up Python 3.12
      if: ${{ inputs.docker_image == 'ghcr.io/intel/llvm/ubuntu2404_intel_drivers:latest' }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
      with:
        python-version: '3.12'

    - name: Install UR python dependencies in venv
      working-directory: ./unified-runtime
      run: |
        python3 -m venv .venv
        . .venv/bin/activate
        echo "$PATH" >> $GITHUB_PATH
        pip install -r third_party/requirements.txt
        pip install -r third_party/requirements_testing.txt

    - name: Download DPC++
      run: |
        wget -O dpcpp_compiler.tar.gz https://github.com/intel/llvm/releases/download/nightly-2025-11-28/sycl_linux.tar.gz
        mkdir -p dpcpp_compiler
        tar -xvf dpcpp_compiler.tar.gz -C dpcpp_compiler

    - name: Install OpenCL CPU Runtime
      if: ${{ inputs.adapter_name == 'OPENCL' }}
      run: |
        wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
        | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" | sudo tee /etc/apt/sources.list.d/oneAPI.list
        sudo apt-get update
        sudo apt-get install -y intel-oneapi-runtime-opencl

    - name: Install Intel GPU driver
      if: ${{ inputs.install_igc_driver && (inputs.adapter_name == 'OPENCL' || contains(inputs.adapter_name,'L0')) }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        sudo -E bash devops/scripts/install_drivers.sh devops/dependencies.json --igfx

    - name: Configure Unified Runtime project
      # ">" is used to avoid adding "\" at the end of each line; this command is quite long
      run: >
        cmake
        -S unified-runtime
        -B build
        -DCMAKE_C_COMPILER=${{matrix.compiler.c}}
        -DCMAKE_CXX_COMPILER=${{matrix.compiler.cxx}}
        -DCMAKE_BUILD_TYPE=${{matrix.build_type}}
        -DUR_ENABLE_TRACING=ON
        -DUR_DEVELOPER_MODE=ON
        -DUR_BUILD_TESTS=ON
        -DUR_BUILD_ADAPTER_${{matrix.adapter.name}}=ON
        ${{ matrix.adapter.other_name != '' && format('-DUR_BUILD_ADAPTER_{0}=ON', matrix.adapter.other_name) || '' }}
        -DUR_STATIC_LOADER=${{matrix.adapter.static_Loader}}
        -DUR_STATIC_ADAPTER_${{matrix.adapter.name}}=${{matrix.adapter.static_adapter}}
        -DUR_DPCXX=./dpcpp_compiler/bin/clang++
        -DUR_SYCL_LIBRARY_DIR=./dpcpp_compiler/lib
        -DCMAKE_INSTALL_PREFIX=./install

    - name: Build
      # This is so that device binaries can find the sycl runtime library
      run: cmake --build build -j $(($(nproc)/3))

    - name: Install
      # This is to check that install command does not fail
      run: cmake --install build

    - name: Test adapter specific
      uses: ./devops/actions/run-tests/ur/adapter-specific
      with:
        build_dir: build
      # Don't run adapter specific tests when building multiple adapters
      if: ${{ matrix.adapter.other_name == '' }}

    - name: Test adapter specific logs
      if: ${{ always() && matrix.adapter.other_name == '' }}
      shell: bash
      run: |
        if [ ! -f adapter_tests.log ]; then
          echo "Log file not found"
          exit 0
        fi
        
        echo "=== Adapter Tests Statistics ==="
        awk '/^ *(Total Discovered|Expected Passes|Expected Failures|Unsupported|Skipped|Passed|Failed|Timed Out|Unexpectedly Passed|Unresolved) *(Tests)? *:/ {print}' adapter_tests.log
        echo ""
        
        if grep -q "^Passed Tests ([0-9]\+):" adapter_tests.log; then
          count=$(grep "^Passed Tests ([0-9]\+):" adapter_tests.log | sed 's/Passed Tests (\([0-9]\+\)):/\1/' | head -1)
          if [[ "$count" =~ ^[0-9]+$ ]]; then
            echo "::group::Passed Tests ($count)"
            awk '/^Passed Tests \([0-9]+\):/ {flag=1; next} /^$/ {flag=0} flag' adapter_tests.log
            echo "::endgroup::"
          fi
        fi
        
        if grep -q "^Unsupported Tests ([0-9]\+):" adapter_tests.log; then
          count=$(grep "^Unsupported Tests ([0-9]\+):" adapter_tests.log | sed 's/Unsupported Tests (\([0-9]\+\)):/\1/' | head -1)
          if [[ "$count" =~ ^[0-9]+$ ]]; then
            echo "::group::Unsupported Tests ($count)"
            awk '/^Unsupported Tests \([0-9]+\):/ {flag=1; next} /^$/ {flag=0} flag' adapter_tests.log
            echo "::endgroup::"
          fi
        fi
        
        if grep -q "^Failed Tests ([0-9]\+):" adapter_tests.log; then
          count=$(grep "^Failed Tests ([0-9]\+):" adapter_tests.log | sed 's/Failed Tests (\([0-9]\+\)):/\1/' | head -1)
          if [[ "$count" =~ ^[0-9]+$ ]]; then
            echo "::group::Failed Tests ($count)"
            awk '/^Failed Tests \([0-9]+\):/ {flag=1; next} /^$/ {flag=0} flag' adapter_tests.log
            echo "::endgroup::"
          fi
        fi
        
        if grep -q "^Timed Out Tests ([0-9]\+):" adapter_tests.log; then
          count=$(grep "^Timed Out Tests ([0-9]\+):" adapter_tests.log | sed 's/Timed Out Tests (\([0-9]\+\)):/\1/' | head -1)
          if [[ "$count" =~ ^[0-9]+$ ]]; then
            echo "::group::Timed Out Tests ($count)"
            awk '/^Timed Out Tests \([0-9]+\):/ {flag=1; next} /^$/ {flag=0} flag' adapter_tests.log
            echo "::endgroup::"
          fi
        fi
        
        if grep -q "^Unexpectedly Passed Tests ([0-9]\+):" adapter_tests.log; then
          count=$(grep "^Unexpectedly Passed Tests ([0-9]\+):" adapter_tests.log | sed 's/Unexpectedly Passed Tests (\([0-9]\+\)):/\1/' | head -1)
          if [[ "$count" =~ ^[0-9]+$ ]]; then
            echo "::group::Unexpectedly Passed Tests ($count)"
            awk '/^Unexpectedly Passed Tests \([0-9]+\):/ {flag=1; next} /^$/ {flag=0} flag' adapter_tests.log
            echo "::endgroup::"
          fi
        fi

    - name: Test adapters
      uses: ./devops/actions/run-tests/ur/adapters
      with:
        build_dir: build

    - name: Test adapters logs
      if: ${{ always() }}
      shell: bash
      run: |
        if [ ! -f conformance_tests.log ]; then
          echo "Log file not found"
          exit 0
        fi
        
        echo "=== Conformance Tests Statistics ==="
        awk '/^ *(Total Discovered|Expected Passes|Expected Failures|Unsupported|Skipped|Passed|Failed|Timed Out|Unexpectedly Passed|Unresolved) *(Tests)? *:/ {print}' conformance_tests.log
        echo ""
        
        if grep -q "^Passed Tests ([0-9]\+):" conformance_tests.log; then
          count=$(grep "^Passed Tests ([0-9]\+):" conformance_tests.log | sed 's/Passed Tests (\([0-9]\+\)):/\1/' | head -1)
          if [[ "$count" =~ ^[0-9]+$ ]]; then
            echo "::group::Passed Tests ($count)"
            awk '/^Passed Tests \([0-9]+\):/ {flag=1; next} /^$/ {flag=0} flag' conformance_tests.log
            echo "::endgroup::"
          fi
        fi
        
        if grep -q "^Unsupported Tests ([0-9]\+):" conformance_tests.log; then
          count=$(grep "^Unsupported Tests ([0-9]\+):" conformance_tests.log | sed 's/Unsupported Tests (\([0-9]\+\)):/\1/' | head -1)
          if [[ "$count" =~ ^[0-9]+$ ]]; then
            echo "::group::Unsupported Tests ($count)"
            awk '/^Unsupported Tests \([0-9]+\):/ {flag=1; next} /^$/ {flag=0} flag' conformance_tests.log
            echo "::endgroup::"
          fi
        fi
        
        if grep -q "^Failed Tests ([0-9]\+):" conformance_tests.log; then
          count=$(grep "^Failed Tests ([0-9]\+):" conformance_tests.log | sed 's/Failed Tests (\([0-9]\+\)):/\1/' | head -1)
          if [[ "$count" =~ ^[0-9]+$ ]]; then
            echo "::group::Failed Tests ($count)"
            awk '/^Failed Tests \([0-9]+\):/ {flag=1; next} /^$/ {flag=0} flag' conformance_tests.log
            echo "::endgroup::"
          fi
        fi
        
        if grep -q "^Timed Out Tests ([0-9]\+):" conformance_tests.log; then
          count=$(grep "^Timed Out Tests ([0-9]\+):" conformance_tests.log | sed 's/Timed Out Tests (\([0-9]\+\)):/\1/' | head -1)
          if [[ "$count" =~ ^[0-9]+$ ]]; then
            echo "::group::Timed Out Tests ($count)"
            awk '/^Timed Out Tests \([0-9]+\):/ {flag=1; next} /^$/ {flag=0} flag' conformance_tests.log
            echo "::endgroup::"
          fi
        fi
        
        if grep -q "^Unexpectedly Passed Tests ([0-9]\+):" conformance_tests.log; then
          count=$(grep "^Unexpectedly Passed Tests ([0-9]\+):" conformance_tests.log | sed 's/Unexpectedly Passed Tests (\([0-9]\+\)):/\1/' | head -1)
          if [[ "$count" =~ ^[0-9]+$ ]]; then
            echo "::group::Unexpectedly Passed Tests ($count)"
            awk '/^Unexpectedly Passed Tests \([0-9]+\):/ {flag=1; next} /^$/ {flag=0} flag' conformance_tests.log
            echo "::endgroup::"
          fi
        fi

    - name: Debug CI platform information
      if: ${{ always() }}
      run: ./devops/scripts/get_system_info.sh
