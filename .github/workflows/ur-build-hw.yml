name: UR - Build adapters, test on HW

on:
  workflow_call:
    inputs:
      adapter_name:
        required: true
        type: string
      other_adapter_name:
        required: false
        type: string
        default: ""
      runner_name:
        required: true
        type: string
      static_loader:
        required: false
        type: string
        default: OFF
      static_adapter:
        required: false
        type: string
        default: OFF
      docker_image:
        required: true
        type: string
        default: ""
      image_options:
        required: true
        type: string
        default: ""
      install_igc_driver:
        required: false
        type: string
        default: ""

permissions: read-all

env:
  UR_LOG_CUDA: "level:error;flush:error"
  UR_LOG_HIP: "level:error;flush:error"
  UR_LOG_LEVEL_ZERO: "level:error;flush:error"
  UR_LOG_NATIVE_CPU: "level:error;flush:error"
  UR_LOG_OPENCL: "level:error;flush:error"

jobs:
  adapter_build_hw:
    name: Build & CTS
    # run only on upstream; forks won't have the HW
    if: github.repository == 'intel/llvm'
    strategy:
      fail-fast: false
      matrix:
        adapter: [
          {
            name: "${{inputs.adapter_name}}",
            other_name: "${{inputs.other_adapter_name}}",
            static_Loader: "${{inputs.static_loader}}",
            static_adapter: "${{inputs.static_loader}}"
          }
        ]
        build_type: [Release]
        compiler: [{c: gcc, cxx: g++}]

    runs-on: ${{inputs.runner_name}}
    container:
      image: ${{ inputs.docker_image }}
      options: ${{ inputs.image_options }}

    steps:
    # TODO:
    # - switch to Ninja generator in CMake
    # - downloading DPC++ should be integrated somehow; most likely use nightly release.
    #
    - name: Checkout LLVM
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    # for some reason it's required to re-configure python for venv to work properly.
    - name: Set up Python 3.12
      if: ${{ inputs.docker_image == 'ghcr.io/intel/llvm/ubuntu2404_intel_drivers:latest' }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
      with:
        python-version: '3.12'

    - name: Install UR python dependencies in venv
      working-directory: ./unified-runtime
      run: |
        python3 -m venv .venv
        . .venv/bin/activate
        echo "$PATH" >> $GITHUB_PATH
        pip install -r third_party/requirements.txt
        pip install -r third_party/requirements_testing.txt

    - name: Download DPC++
      run: |
        wget -O dpcpp_compiler.tar.gz https://github.com/intel/llvm/releases/download/nightly-2025-11-28/sycl_linux.tar.gz
        mkdir -p dpcpp_compiler
        tar -xvf dpcpp_compiler.tar.gz -C dpcpp_compiler

    - name: Install OpenCL CPU Runtime
      if: ${{ inputs.adapter_name == 'OPENCL' }}
      run: |
        wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
        | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" | sudo tee /etc/apt/sources.list.d/oneAPI.list
        sudo apt-get update
        sudo apt-get install -y intel-oneapi-runtime-opencl

    - name: Install Intel GPU driver
      if: ${{ inputs.install_igc_driver && (inputs.adapter_name == 'OPENCL' || contains(inputs.adapter_name,'L0')) }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        sudo -E bash devops/scripts/install_drivers.sh devops/dependencies.json --igfx

    - name: Configure Unified Runtime project
      # ">" is used to avoid adding "\" at the end of each line; this command is quite long
      run: >
        cmake
        -S unified-runtime
        -B build
        -DCMAKE_C_COMPILER=${{matrix.compiler.c}}
        -DCMAKE_CXX_COMPILER=${{matrix.compiler.cxx}}
        -DCMAKE_BUILD_TYPE=${{matrix.build_type}}
        -DUR_ENABLE_TRACING=ON
        -DUR_DEVELOPER_MODE=ON
        -DUR_BUILD_TESTS=ON
        -DUR_BUILD_ADAPTER_${{matrix.adapter.name}}=ON
        ${{ matrix.adapter.other_name != '' && format('-DUR_BUILD_ADAPTER_{0}=ON', matrix.adapter.other_name) || '' }}
        -DUR_STATIC_LOADER=${{matrix.adapter.static_Loader}}
        -DUR_STATIC_ADAPTER_${{matrix.adapter.name}}=${{matrix.adapter.static_adapter}}
        -DUR_DPCXX=./dpcpp_compiler/bin/clang++
        -DUR_SYCL_LIBRARY_DIR=./dpcpp_compiler/lib
        -DCMAKE_INSTALL_PREFIX=./install

    - name: Build
      # This is so that device binaries can find the sycl runtime library
      run: cmake --build build -j $(($(nproc)/3))

    - name: Install
      # This is to check that install command does not fail
      run: cmake --install build

    - name: Test adapter specific
      id: run_adapter_tests
      continue-on-error: true
      env:
        ZE_ENABLE_LOADER_DEBUG_TRACE: 1
        LIT_OPTS: "-v --no-progress-bar --show-unsupported --show-pass --show-xfail --timeout 120 -j 50"
        # These tests cause timeouts on CI
        LIT_FILTER_OUT: "(adapters/level_zero/memcheck.test|adapters/level_zero/v2/deferred_kernel_memcheck.test)"
      run: |
        cmake --build build -j $(($(nproc)/3)) -- check-unified-runtime-adapter > adapter_tests.log 2>&1
      # Don't run adapter specific tests when building multiple adapters
      if: ${{ matrix.adapter.other_name == '' }}

    - name: Test adapters
      id: run_conformance_tests
      continue-on-error: true
      env:
        ZE_ENABLE_LOADER_DEBUG_TRACE: 1
        LIT_OPTS: "-v --no-progress-bar --show-unsupported --show-pass --show-xfail --timeout 120 -j 50"
      run: |
        cmake --build build -j $(($(nproc)/3)) -- check-unified-runtime-conformance > conformance_tests.log 2>&1

    - name: Adapter Tests logs
      if: ${{ always() && matrix.adapter.other_name == '' }}
      run: |
        echo "::group::Show Full Adapter Tests Log"
        cat adapter_tests.log
        echo "::endgroup::"

    - name: Conformance Tests logs
      if: ${{ always() }}
      run: |
        echo "::group::Show Full Conformance Tests Log"
        cat conformance_tests.log
        echo "::endgroup::"

    - name: Report Adapter Tests Summary
      if: ${{ always() && matrix.adapter.other_name == '' }}
      run: |
        echo "## Adapter Tests Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Extract test lists from LIT output
        PASSED_TESTS=$(grep "^PASS: " adapter_tests.log | sed 's/^PASS: //' || echo "")
        FAILED_TESTS=$(grep "^FAIL: " adapter_tests.log | sed 's/^FAIL: //' || echo "")
        UNSUPPORTED_TESTS=$(grep "^UNSUPPORTED: " adapter_tests.log | sed 's/^UNSUPPORTED: //' || echo "")
        XFAIL_TESTS=$(grep "^XFAIL: " adapter_tests.log | sed 's/^XFAIL: //' || echo "")
        
        PASS_COUNT=$(echo "$PASSED_TESTS" | grep -c "." || echo "0")
        FAIL_COUNT=$(echo "$FAILED_TESTS" | grep -c "." || echo "0")
        UNSUPPORTED_COUNT=$(echo "$UNSUPPORTED_TESTS" | grep -c "." || echo "0")
        XFAIL_COUNT=$(echo "$XFAIL_TESTS" | grep -c "." || echo "0")
        
        # Summary stats
        echo "**Statistics:**" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Passed: $PASS_COUNT" >> $GITHUB_STEP_SUMMARY
        echo "- ❌ Failed: $FAIL_COUNT" >> $GITHUB_STEP_SUMMARY
        echo "- ⊘ Unsupported: $UNSUPPORTED_COUNT" >> $GITHUB_STEP_SUMMARY
        echo "- ⚠️ Expected Failures: $XFAIL_COUNT" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Passed tests list
        if [ "$PASS_COUNT" -gt 0 ]; then
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>Passed Tests ($PASS_COUNT)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$PASSED_TESTS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi
        
        # Failed tests list
        if [ "$FAIL_COUNT" -gt 0 ]; then
          echo "<details open>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>Failed Tests ($FAIL_COUNT)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$FAILED_TESTS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi
        
        # Unsupported tests list
        if [ "$UNSUPPORTED_COUNT" -gt 0 ]; then
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>Unsupported Tests ($UNSUPPORTED_COUNT)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$UNSUPPORTED_TESTS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi
        
        # Expectedly failed tests list
        if [ "$XFAIL_COUNT" -gt 0 ]; then
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>Expected Failures ($XFAIL_COUNT)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$XFAIL_TESTS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
        fi
        
        # Fail if there are failed tests
        if [ "$FAIL_COUNT" -gt 0 ]; then
          exit 1
        fi

    - name: Report Conformance Tests Summary
      if: ${{ always() }}
      run: |
        echo "## Conformance Tests Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Extract test lists from LIT output
        PASSED_TESTS=$(grep "^PASS: " conformance_tests.log | sed 's/^PASS: //' || echo "")
        FAILED_TESTS=$(grep "^FAIL: " conformance_tests.log | sed 's/^FAIL: //' || echo "")
        UNSUPPORTED_TESTS=$(grep "^UNSUPPORTED: " conformance_tests.log | sed 's/^UNSUPPORTED: //' || echo "")
        XFAIL_TESTS=$(grep "^XFAIL: " conformance_tests.log | sed 's/^XFAIL: //' || echo "")
        
        PASS_COUNT=$(echo "$PASSED_TESTS" | grep -c "." || echo "0")
        FAIL_COUNT=$(echo "$FAILED_TESTS" | grep -c "." || echo "0")
        UNSUPPORTED_COUNT=$(echo "$UNSUPPORTED_TESTS" | grep -c "." || echo "0")
        XFAIL_COUNT=$(echo "$XFAIL_TESTS" | grep -c "." || echo "0")
        
        # Summary stats
        echo "**Statistics:**" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Passed: $PASS_COUNT" >> $GITHUB_STEP_SUMMARY
        echo "- ❌ Failed: $FAIL_COUNT" >> $GITHUB_STEP_SUMMARY
        echo "- ⊘ Unsupported: $UNSUPPORTED_COUNT" >> $GITHUB_STEP_SUMMARY
        echo "- ⚠️ Expected Failures: $XFAIL_COUNT" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Passed tests list
        if [ "$PASS_COUNT" -gt 0 ]; then
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>Passed Tests ($PASS_COUNT)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$PASSED_TESTS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi
        
        # Failed tests list
        if [ "$FAIL_COUNT" -gt 0 ]; then
          echo "<details open>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>Failed Tests ($FAIL_COUNT)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$FAILED_TESTS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi
        
        # Unsupported tests list
        if [ "$UNSUPPORTED_COUNT" -gt 0 ]; then
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>Unsupported Tests ($UNSUPPORTED_COUNT)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$UNSUPPORTED_TESTS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi
        
        # Expectedly failed tests list
        if [ "$XFAIL_COUNT" -gt 0 ]; then
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>Expected Failures ($XFAIL_COUNT)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$XFAIL_TESTS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
        fi
        
        # Fail if there are failed tests
        if [ "$FAIL_COUNT" -gt 0 ]; then
          exit 1
        fi

    - name: Debug CI platform information
      if: ${{ always() }}
      run: ./devops/scripts/get_system_info.sh
