name: Runner Version Check

on: [push, pull_request]

jobs:
  check-runner-version:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: [UR_CUDA]
            name: UR_SM_NVIDIA_41_01
      fail-fast: false
    
    name: Check ${{ matrix.name }}
    
    steps:
      - name: Get Runner Version (Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "OS: $RUNNER_OS"
          echo "Arch: $RUNNER_ARCH"
          echo ""
          
          RUNNER_BIN=""
          if [ -f "$HOME/actions-runner/bin/Runner.Listener" ]; then
            RUNNER_BIN="$HOME/actions-runner/bin/Runner.Listener"
          elif [ -f "/opt/actions-runner/bin/Runner.Listener" ]; then
            RUNNER_BIN="/opt/actions-runner/bin/Runner.Listener"
          else
            echo "Runner.Listener not found"
            exit 1
          fi
          
          echo "Found runner at: $RUNNER_BIN"
          VERSION=$($RUNNER_BIN --version 2>&1 | head -n1 || echo "unknown")
          echo "Version: $VERSION"
          
          VERSION_NUM=$(echo "$VERSION" | grep -oP '\d+\.\d+\.\d+' || echo "0.0.0")
          echo "Parsed version: $VERSION_NUM"
          
          REQUIRED="2.329.0"
          if [ "$(printf '%s\n' "$REQUIRED" "$VERSION_NUM" | sort -V | head -n1)" = "$REQUIRED" ] && [ "$VERSION_NUM" != "$REQUIRED" ]; then
            echo "Version OK"
          elif [ "$VERSION_NUM" = "$REQUIRED" ]; then
            echo "Version OK"
          else
            echo "Version TOO LOW"
            exit 1
          fi

      - name: Get Runner Version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "OS: $env:RUNNER_OS"
          Write-Host "Arch: $env:RUNNER_ARCH"
          Write-Host ""
          
          $runnerPaths = @(
            "$env:USERPROFILE\actions-runner\bin\Runner.Listener.exe",
            "C:\actions-runner\bin\Runner.Listener.exe"
          )
          
          $runnerBin = $null
          foreach ($path in $runnerPaths) {
            if (Test-Path $path) {
              $runnerBin = $path
              break
            }
          }
          
          if (-not $runnerBin) {
            Write-Host "Runner.Listener.exe not found"
            exit 1
          }
          
          Write-Host "Found runner at: $runnerBin"
          $version = & $runnerBin --version 2>&1 | Select-Object -First 1
          Write-Host "Version: $version"
          
          if ($version -match '(\d+\.\d+\.\d+)') {
            $versionNum = $matches[1]
            Write-Host "Parsed version: $versionNum"
            
            $required = [version]"2.329.0"
            $current = [version]$versionNum
            
            if ($current -ge $required) {
              Write-Host "Version OK"
            } else {
              Write-Host "Version TOO LOW"
              exit 1
            }
          } else {
            Write-Host "Could not parse version number"
            exit 1
          }
          