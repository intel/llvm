name: Reusable SYCL Windows build workflow

on:
  workflow_call:
    inputs:
      cxx:
        type: string
        required: false
        default: "cl"
      build_cache_suffix:
        type: string
        required: false
        default: "default"
      ref:
        type: string
        required: False
      build_configure_extra_args:
        type: string
        required: false
      build_target:
        type: string
        required: false
        default: sycl-toolchain

      report_jit_size:
        type: boolean
        required: false
        default: false
        description: 'Report sycl-jit.dll on-disk and compressed (download) size in the job summary.'

      changes:
        type: string
        description: 'Filter matches for the changed files in the PR'
        default: '[llvm, clang, sycl, llvm_spirv, xptifw, libclc]'
        required: false

      # Artifacts:
      retention-days:
        description: 'Artifacts retention period'
        type: string
        default: 3

      toolchain_artifact_filename:
        type: string
        default: llvm_sycl.tar.gz

      release_toolchain_artifact:
        type: string
        required: false
        description: |
          If provided, create an additional toolchain artifact without utilities
          used for testing in it. File name of the archive is the same as in the
          `toolchain_artifact` above.

      e2e_binaries_artifact:
        type: string
        required: false

      e2e_binaries_new_offload_model_artifact:
        type: string
        required: false

    outputs:
      build_conclusion:
        value: ${{ jobs.build.outputs.build_conclusion }}
      toolchain_artifact_filename:
        value: ${{ inputs.toolchain_artifact_filename }}

  workflow_dispatch:
    inputs:
      changes:
        description: 'Filter matches for the changed files in the PR'
        type: choice
        options:
          - "[]"
          - '[sycl]'
          - '[llvm, clang, sycl, llvm_spirv, xptifw, libclc]'
      build_cache_suffix:
        type: choice
        options:
          - "default"
      build_configure_extra_args:
        type: string
        required: false
      build_target:
        type: choice
        options:
          - "sycl-toolchain"
          - "all"
          # Build only the JIT library (fast path for the size probe).
          - "sycl-jit"
      report_jit_size:
        description: 'Report sycl-jit.dll size and skip the deploy/test tail.'
        type: boolean
        default: false
      toolchain_artifact_filename:
        type: choice
        options:
          - 'llvm_sycl.tar.gz'
        default:
      retention-days:
        type: choice
        options:
          - 3
      cxx:
        type: choice
        options:
          - cl
          - icx

permissions: read-all

jobs:
  build:
    name: Build + LIT
    runs-on: [Windows, build]
    outputs:
      build_conclusion: ${{ steps.build.conclusion }}
    steps:
    - name:  Detect hung tests
      if: always()
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/intel/llvm/refs/heads/sycl/devops/scripts/windows_detect_hung_tests.ps1" -OutFile "windows_detect_hung_tests.ps1" -Headers @{Authorization = "Bearer ${{ github.token }}"}
        powershell.exe -File windows_detect_hung_tests.ps1
        $exitCode = $LASTEXITCODE
        Remove-Item -Path "windows_detect_hung_tests.ps1"
        exit $exitCode
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        sparse-checkout: |
          devops/actions
    - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
      with:
        arch: amd64
    - name: Setup oneAPI env
      uses: ./devops/actions/setup_windows_oneapi_env
      if: ${{ !cancelled() && inputs.cxx == 'icx' }}
    - name: Set env
      run: |
        git config --system core.longpaths true
        git config --global core.autocrlf false
        echo "C:\Program Files\Git\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "CCACHE_DIR=D:\github\_work\cache\${{ inputs.build_cache_suffix }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "CCACHE_MAXSIZE=10G" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "LIT_OPTS='-j$env:NUMBER_OF_PROCESSORS $LIT_OPTS'" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
    - name: Register cleanup after job is finished
      uses: ./devops/actions/cleanup
    - uses: ./devops/actions/cached_checkout
      with:
        path: src
        ref: ${{ inputs.ref || github.sha }}
        cache_path: "D:\\\\github\\\\_work\\\\repo_cache\\\\"
    - name: Configure
      shell: cmd
      env:
         ARGS: ${{ inputs.build_configure_extra_args }}
      # TODO switch to clang-cl and lld when this is fixed https://github.com/oneapi-src/level-zero/issues/83
      run: |
        mkdir build
        mkdir install
        IF NOT EXIST D:\github\_work\cache MKDIR D:\github\_work\cache
        IF NOT EXIST D:\github\_work\cache\${{inputs.build_cache_suffix}} MKDIR D:\github\_work\cache\${{inputs.build_cache_suffix}}
        python.exe src/buildbot/configure.py -o build ^
          --ci-defaults --use-zstd %ARGS% ^
          "-DCMAKE_C_COMPILER=${{inputs.cxx}}" ^
          "-DCMAKE_CXX_COMPILER=${{inputs.cxx}}" ^
          "-DCMAKE_INSTALL_PREFIX=%GITHUB_WORKSPACE%\install" ^
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache ^
          -DCMAKE_C_COMPILER_LAUNCHER=ccache ^
          -DLLVM_INSTALL_UTILS=ON
    - name: Build
      id: build
      shell: bash
      run: |
        cmake --build build --target ${{ inputs.build_target }}
    - run: build/bin/clang++ --version
    - name: Report sycl-jit.dll size
      if: ${{ !cancelled() && steps.build.conclusion == 'success' && inputs.report_jit_size }}
      shell: bash
      run: |
        set -eu
        DLL=$(find build/bin -name 'sycl-jit.dll' -type f | head -1)
        if [ -z "${DLL:-}" ]; then
          echo "sycl-jit.dll not found (target may not have been built); skipping."
          exit 0
        fi
        # Windows debug info lives in a separate .pdb, so the DLL ships as-is (no
        # strip step). Measure zstd as the download-size proxy: it's the
        # compressor the Windows build already uses (`--use-zstd`) and matches
        # the conda / newer-installer packaging.
        RAW=$(stat -c%s "$DLL")
        ZST=$(zstd -19 -q -c "$DLL" | wc -c)
        RAW_MB=$(awk -v b="$RAW" 'BEGIN{printf "%.1f", b/1048576}')
        ZST_MB=$(awk -v b="$ZST" 'BEGIN{printf "%.1f", b/1048576}')
        echo "sycl-jit.dll  raw=${RAW_MB}MB  zstd=${ZST_MB}MB"
        {
          echo "### sycl-jit.dll size (Windows)";
          echo "";
          echo "| Binary | On-disk | Download (zstd -19) |";
          echo "| --- | --- | --- |";
          echo "| sycl-jit.dll | ${RAW_MB} MB | ${ZST_MB} MB |";
        } >> "$GITHUB_STEP_SUMMARY"
    - name: Report SYCL JIT+run runtime closure size
      # Libraries an app needs to JIT-compile SYCL C++ and run it on Intel GPU:
      # sycl.dll (host runtime + UR loader), the dlopen'd sycl-jit.dll (RTC),
      # both L0 adapters (v1 + v2), and umf. DLLs land in build/bin on Windows.
      # Needs build_target: sycl-toolchain. Missing libs are skipped.
      if: ${{ !cancelled() && steps.build.conclusion == 'success' && inputs.report_jit_size }}
      shell: bash
      run: |
        set -eu
        BINDIR="build/bin"
        # Windows-specific closure: unlike Linux (static libur_loader baked into
        # libsycl), Windows ships ur_loader.dll separately plus the Win-only
        # ur_win_proxy_loader.dll shim that locates it.
        PATTERNS="sycl-jit.dll sycl?.dll ur_loader.dll ur_win_proxy_loader.dll ur_adapter_level_zero.dll ur_adapter_level_zero_v2.dll umf.dll"
        RAW_SUM=0; ZST_SUM=0; ROWS=""; MISSING=""
        for pat in $PATTERNS; do
          f=$(find "$BINDIR" -maxdepth 1 -name "$pat" -type f | head -1)
          if [ -z "${f:-}" ]; then MISSING="${MISSING} ${pat}"; continue; fi
          r=$(stat -c%s "$f")
          z=$(zstd -19 -q -c "$f" | wc -c)
          RAW_SUM=$((RAW_SUM + r)); ZST_SUM=$((ZST_SUM + z))
          rmb=$(awk -v b="$r" 'BEGIN{printf "%.1f", b/1048576}')
          zmb=$(awk -v b="$z" 'BEGIN{printf "%.1f", b/1048576}')
          ROWS="${ROWS}| $(basename "$f") | ${rmb} MB | ${zmb} MB |\n"
        done
        RAW_MB=$(awk -v b="$RAW_SUM" 'BEGIN{printf "%.1f", b/1048576}')
        ZST_MB=$(awk -v b="$ZST_SUM" 'BEGIN{printf "%.1f", b/1048576}')
        echo "runtime closure: on-disk=${RAW_MB}MB  compressed=${ZST_MB}MB  (missing:${MISSING:- none})"
        {
          echo "### SYCL JIT+run runtime closure (Windows)";
          echo "";
          echo "| Library | On-disk | Download (zstd -19) |";
          echo "| --- | --- | --- |";
          printf "%b" "$ROWS";
          echo "| **Total** | **${RAW_MB} MB** | **${ZST_MB} MB** |";
          if [ -n "$MISSING" ]; then echo ""; echo "_Not built (skipped):${MISSING}_"; fi
        } >> "$GITHUB_STEP_SUMMARY"
    - name: Report openvino package size
      if: ${{ !cancelled() && steps.build.conclusion == 'success' && inputs.report_jit_size }}
      shell: bash
      run: |
        set -eu
        PKG=openvino
        DL=$(mktemp -d)
        INST=$(mktemp -d)
        # (1) Download size: full wheel closure (package + all deps).
        python -m pip download "$PKG" -d "$DL" --quiet
        DL_BYTES=$(find "$DL" -type f -printf '%s\n' | awk '{s+=$1}END{print s+0}')
        # (2) Installed size: on-disk footprint after unpacking to a clean dir.
        python -m pip install "$PKG" --target "$INST" --quiet
        INST_BYTES=$(find "$INST" -type f -printf '%s\n' | awk '{s+=$1}END{print s+0}')
        DL_MB=$(awk -v b="$DL_BYTES" 'BEGIN{printf "%.1f", b/1048576}')
        INST_MB=$(awk -v b="$INST_BYTES" 'BEGIN{printf "%.1f", b/1048576}')
        echo "openvino  download=${DL_MB}MB  installed=${INST_MB}MB"
        {
          echo "### openvino package size (Windows)";
          echo "";
          echo "| Package | Download (wheels) | Installed (on-disk) |";
          echo "| --- | --- | --- |";
          echo "| openvino | ${DL_MB} MB | ${INST_MB} MB |";
        } >> "$GITHUB_STEP_SUMMARY"
    - name: check-llvm
      if: ${{ !cancelled() && contains(inputs.changes, 'llvm') }}
      shell: bash
      run: |
        cmake --build build --target check-llvm
    - name: check-clang
      if: ${{ !cancelled() && contains(inputs.changes, 'clang') }}
      run: |
        cmake --build build --target check-clang
    - name: check-sycl
      if: ${{ !cancelled() && contains(inputs.changes, 'sycl') }}
      shell: bash
      run: |        
         cmake --build build --target check-sycl
    - name: check-sycl-unittests
      if: ${{ !cancelled() && contains(inputs.changes, 'sycl') }}
      run: |
        cmake --build build --target check-sycl-unittests
    - name: check-llvm-spirv
      if: ${{ !cancelled() && contains(inputs.changes, 'llvm_spirv') }}
      run: |
        cmake --build build --target check-llvm-spirv
    - name: check-xptifw
      if: ${{ !cancelled() && contains(inputs.changes, 'xptifw') }}
      run: |
        cmake --build build --target check-xptifw
    - name: Generate/diff new ABI symbols
      if: ${{ !cancelled() && contains(inputs.changes, 'sycl') && !inputs.report_jit_size }}
      shell: bash
      run: |
        LLVM_BIN_PATH="build/bin" python.exe src/sycl/tools/abi_check.py --mode dump_symbols --output build/new_sycl_symbols_windows.dump build/bin/sycl?.dll
        diff -Naur src/sycl/test/abi/sycl_symbols_windows.dump build/new_sycl_symbols_windows.dump || true
    - name: Upload new ABI symbols
      if: ${{ !cancelled() && contains(inputs.changes, 'sycl') && !inputs.report_jit_size }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: sycl_windows_abi_symbols
        path: build/new_sycl_symbols_windows.dump
        retention-days: ${{ inputs.retention-days }}
    - name: Install sycl-toolchain
      # Skipped in JIT-size-probe mode: `deploy-sycl-toolchain` would rebuild the
      # entire toolchain, defeating the point of a fast size-only build.
      if: ${{ !cancelled() && steps.build.conclusion == 'success' && !inputs.report_jit_size }}
      run: |
        cmake --build build --target deploy-sycl-toolchain

    - name: Pack toolchain release
      if: ${{ !cancelled() && steps.build.conclusion == 'success' && inputs.release_toolchain_artifact != '' }}
      run: tar -czf ${{ inputs.toolchain_artifact_filename }} -C install .
    - name: Upload toolchain release
      if: ${{ !cancelled() && steps.build.conclusion == 'success' && inputs.release_toolchain_artifact != '' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.release_toolchain_artifact }}
        path: ${{ inputs.toolchain_artifact_filename }}
        retention-days: ${{ inputs.retention-days }}

    - name: Install utilities
      if: ${{ !cancelled() && steps.build.conclusion == 'success' && !inputs.report_jit_size }}
      shell: bash
      run: |
        cmake --build $GITHUB_WORKSPACE/build --target install-sycl-test-utilities

    - name: Pack toolchain
      if: ${{ !cancelled() && steps.build.conclusion == 'success' && !inputs.report_jit_size }}
      shell: bash
      run: |
        tar -czf ${{ inputs.toolchain_artifact_filename }} -C install .
    - name: Upload toolchain
      if: ${{ !cancelled() && steps.build.conclusion == 'success' && !inputs.report_jit_size }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: sycl_windows_default
        path: ${{ inputs.toolchain_artifact_filename }}
        retention-days: ${{ inputs.retention-days }}

    - name: Setup SYCL toolchain
      if: ${{ !cancelled() && steps.build.conclusion == 'success' && !inputs.report_jit_size }}
      run: |
        echo "PATH=$env:GITHUB_WORKSPACE\\install\\bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "LIB=$env:GITHUB_WORKSPACE\\install\\lib;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Build E2E tests
      if: ${{ inputs.e2e_binaries_artifact && !cancelled() && steps.build.conclusion == 'success' }}
      uses: ./devops/actions/run-tests/windows/e2e
      with:
        ref: ${{ inputs.ref || github.sha }}
        testing_mode: build-only
        target_devices: all
        binaries_artifact: ${{ inputs.e2e_binaries_artifact }}
        extra_lit_opts: --param sycl_build_targets="spir"
        cxx: ${{ inputs.cxx }}

    - name: Build E2E tests with New Offload Model
      if: |
        inputs.e2e_binaries_new_offload_model_artifact &&
        !cancelled() &&
        steps.build.conclusion == 'success' &&
        contains(github.event.pull_request.labels.*.name, 'new-offload-model')
      uses: ./devops/actions/run-tests/windows/e2e
      with:
        ref: ${{ inputs.ref || github.sha }}
        testing_mode: build-only
        target_devices: all
        binaries_artifact: ${{ inputs.e2e_binaries_new_offload_model_artifact }}
        extra_lit_opts: --param sycl_build_targets="spir" --param enable_new_offload_model=True
        cxx: ${{ inputs.cxx }}

    - name:  Detect hung tests
      if: always()
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/intel/llvm/refs/heads/sycl/devops/scripts/windows_detect_hung_tests.ps1" -OutFile "windows_detect_hung_tests.ps1" -Headers @{Authorization = "Bearer ${{ github.token }}"}
        powershell.exe -File windows_detect_hung_tests.ps1
        $exitCode = $LASTEXITCODE
        Remove-Item -Path "windows_detect_hung_tests.ps1"
        exit $exitCode
