name: SYCL E2E

on:
  workflow_call:
    inputs:
      name:
        type: string
        required: True
      runner:
        type: string
        required: True

      extra_lit_opts:
        description: |
          Extra options to be added to LIT_OPTS.
        type: string
        default: ''
      ref:
        type: string
        required: False
      devops_ref:
        type: string
        required: False
        description: |
          By default we checkout the devops directory from "inputs.ref" branch.
          devops_ref may be specified to checkout the devops dir from different
          branch.
          Note: it doesn't affect ./devops/actions/run-tests/* as these actions
          call checkout again and therefore override the devops directory, so
          configs/dependecies from input.ref are used.

      sycl_toolchain_artifact:
        type: string
        default: 'sycl_windows_default'
        required: False
      sycl_toolchain_archive:
        type: string
        default: ''
        required: False

      env:
        type: string
        default: '{}'
        required: False

      compiler:
        type: string
        required: false
        default: "cl"

      testing_mode:
        type: string
        default: "full"

permissions: read-all

jobs:
  run:
    name: ${{ inputs.name }}
    runs-on: ${{ fromJSON(inputs.runner) }}
    environment: WindowsCILock
    env: ${{ fromJSON(inputs.env) }}
    steps:
    - name:  Detect hung tests
      if: always()
      shell: powershell
      continue-on-error: true
      run: |
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/intel/llvm/refs/heads/sycl/devops/scripts/windows_detect_hung_tests.ps1" -OutFile "windows_detect_hung_tests.ps1"
        powershell.exe -File windows_detect_hung_tests.ps1
        $exitCode = $LASTEXITCODE
        Remove-Item -Path "windows_detect_hung_tests.ps1"
        exit $exitCode
    - uses: actions/checkout@v4
      with:
        sparse-checkout: |
          devops/actions
        ref: ${{ inputs.devops_ref|| inputs.ref || github.sha }}
    - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756
      with:
        arch: amd64
    - name: Setup oneAPI env
      uses: ./devops/actions/setup_windows_oneapi_env
      if: ${{ always() && !cancelled() && inputs.compiler == 'icx' }}
    - name: Set env
      run: |
        git config --system core.longpaths true
        git config --global core.autocrlf false
        echo "C:\Program Files\Git\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
    - name: Register cleanup after job is finished
      uses: ./devops/actions/cleanup
    - uses: ./devops/actions/cached_checkout
      with:
        path: llvm
        ref: ${{ inputs.ref || github.sha }}
        cache_path: "D:\\\\github\\\\_work\\\\repo_cache\\\\"
    - name: Download compiler toolchain
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.sycl_toolchain_artifact }}
    - name: Extract SYCL toolchain
      shell: bash
      run: |
        mkdir install
        tar -xf ${{ inputs.sycl_toolchain_archive }} -C install
        rm ${{ inputs.sycl_toolchain_archive }}
    - name: Setup SYCL toolchain
      run: |
        echo "PATH=$env:GITHUB_WORKSPACE\\install\\bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
    - run: |
        sycl-ls
    - run: |
        sycl-ls --verbose

    - name: Download E2E Binaries
      if: inputs.testing_mode == 'run-only'
      uses: actions/download-artifact@v4
      with:
        name: sycl_windows_e2ebin
    - name: Extract E2E Binaries
      if: inputs.testing_mode == 'run-only'
      shell: bash
      run: |
        mkdir build-e2e
        tar -xf e2e_bin.tar.gz -C build-e2e

    - name: Configure E2E with Level Zero target
      shell: cmd
      run: |
        mkdir build-e2e
        cmake -GNinja -B build-e2e -S.\llvm\sycl\test-e2e -DSYCL_TEST_E2E_TARGETS="level_zero:gpu" -DCMAKE_CXX_COMPILER="clang++" -DLEVEL_ZERO_LIBS_DIR="D:\\github\\level-zero_win-sdk\\lib" -DLEVEL_ZERO_INCLUDE="D:\\github\\level-zero_win-sdk\\include" -DLLVM_LIT="..\\llvm\\llvm\\utils\\lit\\lit.py"

    - name: Keep track of files after configuring E2E step
      if: ${{ always() && inputs.testing_mode == 'build-only' }}
      shell: bash
      run: ls build-e2e > e2econf_files.txt

    - name: Run End-to-End tests
      shell: bash
      run: |
        # Run E2E tests.
        if [[ ${{inputs.compiler}} == 'icx' ]]; then
           export LIT_FILTER_OUT="compile_on_win_with_mdd"
        fi
        export LIT_OPTS="-v --no-progress-bar --show-unsupported --show-pass --show-xfail --max-time 3600 --time-tests --param test-mode=${{ inputs.testing_mode }} ${{ inputs.extra_lit_opts }}"
        cmake --build build-e2e --target check-sycl-e2e

    # This needs to be done because the absolute path of the build-e2e folder
    # is not the same on the building vs running systems, so it will fail
    # running due to CMakeCache.txt containing different paths
    - name: Remove E2E configuration files
      if: ${{ always() && inputs.testing_mode == 'build-only' }}
      shell: bash
      run: |
        for FILE in $(cat e2econf_files.txt); do rm -r build-e2e/$FILE; done
        rm e2econf_files.txt

    - name: Pack E2E test binaries
      if: ${{ always() && inputs.testing_mode == 'build-only' }}
      shell: bash
      run: |
        tar -czf e2e_bin.tar.gz -C build-e2e .
    - name: Upload E2E test binaries
      if: ${{ always() && inputs.testing_mode == 'build-only' }}
      uses: actions/upload-artifact@v4
      with:
        name: sycl_windows_e2ebin
        path: e2e_bin.tar.gz
        retention-days: 3

    - name:  Detect hung tests
      if: always()
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/intel/llvm/refs/heads/sycl/devops/scripts/windows_detect_hung_tests.ps1" -OutFile "windows_detect_hung_tests.ps1"      
        powershell.exe -File windows_detect_hung_tests.ps1
        $exitCode = $LASTEXITCODE
        Remove-Item -Path "windows_detect_hung_tests.ps1"
        exit $exitCode
    - name: Cleanup
      shell: cmd
      if: always()
      run: |
        rmdir /q /s install
        rmdir /q /s build-e2e
