name: SPIR-V Tests

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'llvm/lib/Target/SPIRV/**'
      - 'llvm/test/CodeGen/SPIRV/**'
      - '.github/workflows/spirv-tests.yml'

concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  check_spirv:
    if: github.repository_owner == 'llvm'
    name: Test SPIR-V
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/llvm/ci-ubuntu-24.04:latest@sha256:26c16c2c1d57a0e052e01873db555dd56f1d462cbacdd496fecae0b486266a8e
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          max-size: 2G
          key: spirv-ubuntu-24.04
          variant: sccache
      - name: Build and Test
        run: |
          cmake -GNinja \
            -S llvm \
            -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_ASSERTIONS=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -DLLVM_TARGETS_TO_BUILD="SPIRV" \
            -DLLVM_INCLUDE_SPIRV_TOOLS_TESTS=ON
          ninja -C build check-llvm-codegen-spirv
