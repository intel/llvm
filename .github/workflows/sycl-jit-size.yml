name: SYCL JIT binary size (SPIR-V only)

# One-shot, manually-triggered probe of the JIT library's size.
#
# The reusable build workflows hardcode `configure.py --ci-defaults`, which
# forces NVPTX + libclc into the *tree* build and emits its own
# `-DLLVM_TARGETS_TO_BUILD` (so a SPIR-V-only tree can't be requested here).
# However, `-DSYCL_JIT_TARGETS=SPIRV` is a passthrough `-D` that configure.py
# appends LAST to the cmake command, so it wins: `libsycl-jit` embeds only the
# SPIR-V device libraries (no libclc), which is the slim size we want to
# measure. The tree still contains the NVPTX backend, but that does not land in
# `libsycl-jit`.
#
# `report_jit_size: true` enables the size step AND skips the heavy
# deploy/install/pack/upload tail; `changes: '[]'` skips every check-* test.
# `build_target: sycl-jit` builds only the measured library.

on:
  # Manual only -- run it when you want a number, not on a schedule.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: Linux JIT size
    uses: ./.github/workflows/sycl-linux-build.yml
    secrets: inherit
    with:
      build_ref: ${{ github.sha }}
      build_cache_root: "/__w/"
      build_cache_suffix: jit-size-spirv
      build_image: ghcr.io/intel/llvm/ubuntu2204_build:latest
      # Passthrough -D: appended last by configure.py, so it wins over
      # --ci-defaults. Slims the JIT embed to SPIR-V only (drops libclc).
      build_configure_extra_args: "-DSYCL_JIT_TARGETS=SPIRV"
      # Build just the library we measure -- not the whole toolchain.
      build_target: sycl-jit
      # Skip all check-* test steps (gated on `changes`).
      changes: '[]'
      report_jit_size: true
      retention-days: 1
      toolchain_artifact: sycl_linux_jit_size

  windows:
    name: Windows JIT size
    uses: ./.github/workflows/sycl-windows-build.yml
    secrets: inherit
    with:
      build_configure_extra_args: "-DSYCL_JIT_TARGETS=SPIRV"
      build_target: sycl-jit
      changes: '[]'
      report_jit_size: true
      retention-days: 1
