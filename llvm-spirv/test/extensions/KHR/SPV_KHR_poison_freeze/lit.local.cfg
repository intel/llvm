import subprocess
import re

# Check if spirv-val is available and get its version
try:
    result = subprocess.run(
        ['spirv-val', '--version'],
        capture_output=True,
        text=True,
        timeout=5
    )
    version_output = result.stdout + result.stderr

    # Parse version string - expecting format like "v2026.2" or "SPIRV-Tools v2026.2"
    # The version format is typically: SPIRV-Tools v<year>.<release>
    match = re.search(r'v(\d{4})\.(\d+)', version_output)

    if match:
        year = int(match.group(1))
        release = int(match.group(2))

        # Check if version is older than SPIRV-Tools v2026.2
        if year < 2026 or (year == 2026 and release < 2):
            config.unsupported = True
    else:
        # If we can't parse the version, mark as unsupported to be safe
        config.unsupported = True

except (subprocess.TimeoutExpired, FileNotFoundError, OSError):
    # If spirv-val is not available or times out, mark as unsupported
    config.unsupported = True
